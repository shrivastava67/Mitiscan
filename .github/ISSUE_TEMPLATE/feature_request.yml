name: Feature request
description: Suggest an enhancement.
title: "[feat] "
labels: ["enhancement", "triage"]
body:
  - type: textarea
    id: problem
    attributes:
      label: Problem
      description: What user need or pain motivates this?
    validations:
      required: true
  - type: textarea
    id: proposal
    attributes:
      label: Proposed solution
    validations:
      required: true
  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
  - type: checkboxes
    id: scope
    attributes:
      label: Scope confirmation
      options:
        - label: I searched existing issues and discussions.
          required: true
        - label: This is not a security vulnerability.
          required: true
