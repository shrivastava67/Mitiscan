name: Bug report
description: Report a defect in Mitiscan.
title: "[bug] "
labels: ["bug", "triage"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for filing! For **security** issues, use
        [Private Vulnerability Reporting](../../security/advisories/new) instead.
  - type: textarea
    id: what-happened
    attributes:
      label: What happened?
      description: Concise description of the bug.
    validations:
      required: true
  - type: textarea
    id: repro
    attributes:
      label: Steps to reproduce
      placeholder: |
        1. ...
        2. ...
        3. ...
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
    validations:
      required: true
  - type: input
    id: version
    attributes:
      label: Mitiscan version
      description: Output of `mitiscan --version` (or commit SHA).
    validations:
      required: true
  - type: input
    id: python
    attributes:
      label: Python version
      description: Output of `python --version`.
    validations:
      required: true
  - type: dropdown
    id: os
    attributes:
      label: Operating system
      options:
        - Linux
        - macOS
        - Windows
        - Other
    validations:
      required: true
  - type: textarea
    id: logs
    attributes:
      label: Relevant logs / stack trace
      render: shell
  - type: checkboxes
    id: confirm
    attributes:
      label: Confirmation
      options:
        - label: I searched existing issues.
          required: true
        - label: This is not a security vulnerability.
          required: true
