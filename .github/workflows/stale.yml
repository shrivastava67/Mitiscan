name: Close stale issues

on:
  schedule:
    - cron: "0 1 * * *"
  workflow_dispatch:

permissions:
  issues: write
  pull-requests: write

jobs:
  stale:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/stale@v9
        with:
          days-before-issue-stale: 60
          days-before-issue-close: 14
          days-before-pr-stale: 30
          days-before-pr-close: 14
          stale-issue-label: stale
          stale-pr-label: stale
          exempt-issue-labels: "security,pinned,roadmap"
          exempt-pr-labels: "security,pinned"
          stale-issue-message: "This issue has been inactive. It will close in 14 days unless updated."
          stale-pr-message: "This PR has been inactive. It will close in 14 days unless updated."
